[package]
name = "egglog"
version = "2.0.0"
edition = "2024"
description = "eggbau-local wrapper for patched egglog sources"
repository = "https://github.com/egraphs-good/egglog"
keywords = ["e-graphs", "egglog", "datalog", "compiler", "equality"]
license = "MIT"
readme = "README.md"
build = "build.rs"

[lib]
path = "../egglog/src/lib.rs"

[[bin]]
name = "egglog"
path = "../egglog/src/main.rs"
required-features = ["bin"]

[features]
default = ["bin"]
bin = [
  "serde",
  "graphviz",
  "dep:clap",
  "dep:env_logger",
  "dep:mimalloc",
]
serde = ["egraph-serialize/serde"]
graphviz = ["egraph-serialize/graphviz"]

[dependencies]
clap = { version = "4", features = ["derive"], optional = true }
egraph-serialize = { version = "0.3.0", default-features = false }
env_logger = { version = "0.11", optional = true }
hashbrown = "0.16"
im-rc = "15.1.0"
indexmap = "2.2"
log = "0.4"
num = "0.4.3"
ordered-float = "5.0"
rustc-hash = "2.1"
thiserror = "2.0"
web-time = "1.1"
dyn-clone = "1.0.17"
enum-map = "2.7"
rayon = "1.10.0"
mimalloc = { version = "0.1", optional = true }
csv = "1.3"
serde_json = "1.0"
egglog-core-relations = { path = "../egglog/core-relations", version = "2.0.0" }
egglog-ast = { path = "../egglog/egglog-ast", version = "2.0.0" }
egglog-bridge = { path = "../egglog/egglog-bridge", version = "2.0.0" }
egglog-numeric-id = { path = "../egglog/numeric-id", version = "2.0.0" }
egglog-add-primitive = { path = "../egglog/src/sort/add_primitive", version = "2.0.0" }
egglog-reports = { path = "../egglog/egglog-reports", version = "2.0.0" }
